services:
  # ── Python AI Microservice ───────────────────────────────────────────────────
  - type: web
    name: diu-ai-service
    runtime: python
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GROQ_MODEL
        value: mixtral-8x7b-32768
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_TOKENS
        value: "1024"

  # ── Spring Boot API ──────────────────────────────────────────────────────────
  - type: web
    name: diu-spring-api
    runtime: java
    rootDir: backend-spring-boot
    buildCommand: mvn package -DskipTests
    startCommand: java -jar target/university-automation-1.0.0.jar
    envVars:
      - key: PYTHON_SERVICE_URL
        fromService:
          name: diu-ai-service
          type: web
          property: host        # auto-wired to the Python service URL
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: diu-frontend
          type: web
          property: host
      - key: MAIL_USERNAME
        sync: false             # set manually in Render dashboard
      - key: MAIL_PASSWORD
        sync: false             # set manually in Render dashboard
      - key: SERVER_PORT
        value: "8080"

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: diu-frontend
    runtime: static
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: diu-spring-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
