# Database is now hosted on Supabase (not Render)
# Connection credentials are set as env vars on diu-spring-api below.

services:
  # ── Python AI Microservice ───────────────────────────────────────────────────
  - type: web
    name: diu-ai-service
    runtime: python
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_MODEL_2
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY_3
        sync: false
      - key: GROQ_MODEL_3
        value: llama-3.3-70b-versatile
      - key: RAPIDAPI_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_TOKENS
        value: "2048"

  # ── Spring Boot API ──────────────────────────────────────────────────────────
  - type: web
    name: diu-spring-api
    runtime: docker
    dockerfilePath: backend-spring-boot/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # ── Supabase PostgreSQL (via SESSION POOLER) ───────────────────────────
      # ⚠️ Do NOT use the direct host db.<ref>.supabase.co — it is IPv6-only and
      # Render (IPv4) cannot reach it. Use the Session Pooler instead.
      # Get exact values from: Supabase → Project Settings → Database →
      # "Connection string" → tab "Session pooler".
      - key: DB_HOST
        value: aws-1-ap-southeast-2.pooler.supabase.com   # Supabase Session Pooler (IPv4)
      - key: DB_PORT
        value: "5432"   # session pooler port (use 5432; avoid 6543 transaction mode with Hibernate)
      - key: DB_NAME
        value: postgres
      - key: DB_USERNAME
        value: postgres.rkczcdhdzdpmdfzakrtu   # pooler username INCLUDES the project ref
      - key: DB_PASSWORD
        sync: false   # Set this manually in Render Dashboard → diu-spring-api → Environment
      - key: JWT_SECRET
        sync: false
      # ── Admin portal account (seeded on boot, BCrypt-hashed) ───────────────
      # Set both manually in Render Dashboard → diu-spring-api → Environment.
      # Only the administrator should know these values.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PYTHON_SERVICE_URL
        fromService:
          name: diu-ai-service
          type: web
          property: host
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: diu-frontend
          type: web
          property: host
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: diu-frontend
    runtime: static
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: diu-spring-api
          type: web
          property: host
      - key: REACT_APP_AI_URL
        fromService:
          name: diu-ai-service
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
