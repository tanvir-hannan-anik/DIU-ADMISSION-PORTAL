services:
  # ── Python AI Microservice ───────────────────────────────────────────────────
  - type: web
    name: diu-ai-service
    runtime: python
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_MODEL_2
        value: llama-3.3-70b-versatile
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_TOKENS
        value: "1024"

  # ── Spring Boot API ──────────────────────────────────────────────────────────
  - type: web
    name: diu-spring-api
    runtime: docker
    dockerfilePath: backend-spring-boot/Dockerfile
    envVars:
      - key: PYTHON_SERVICE_URL
        fromService:
          name: diu-ai-service
          type: web
          property: host
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: diu-frontend
          type: web
          property: host
      - key: JWT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: diu-frontend
    runtime: static
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: diu-spring-api
          type: web
          property: host
      - key: REACT_APP_AI_URL
        fromService:
          name: diu-ai-service
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
