<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ── Primary Meta ────────────────────────────────────────────────────── -->
    <title>Daffodil International University – Student & Admission Portal</title>
    <meta name="description" content="Daffodil International University (DIU) official portal – apply for admission, register courses, pay fees, view results, and get AI-powered academic advising." />
    <meta name="keywords" content="Daffodil International University, DIU, DIU admission, DIU course registration, Bangladesh university, private university Bangladesh, DIU portal, online admission" />
    <meta name="author" content="Daffodil International University" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://diu.edu.bd/" />
    <meta name="theme-color" content="#0C1282" />

    <!-- ── Favicon ─────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Open Graph (Facebook / LinkedIn) ───────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://diu.edu.bd/" />
    <meta property="og:site_name"   content="Daffodil International University" />
    <meta property="og:title"       content="Daffodil International University – Student & Admission Portal" />
    <meta property="og:description" content="Apply for admission, register courses, access results, and get AI-powered academic advising at Daffodil International University." />
    <meta property="og:image"       content="https://diu.edu.bd/og-cover.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter Card ───────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@DIU_Official" />
    <meta name="twitter:title"       content="Daffodil International University – Student & Admission Portal" />
    <meta name="twitter:description" content="Apply for admission, register courses, access results, and get AI-powered academic advising at Daffodil International University." />
    <meta name="twitter:image"       content="https://diu.edu.bd/og-cover.png" />

    <!-- ── JSON-LD Structured Data ────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollegeOrUniversity",
      "name": "Daffodil International University",
      "alternateName": "DIU",
      "url": "https://diu.edu.bd",
      "logo": "https://diu.edu.bd/favicon.png",
      "description": "Daffodil International University (DIU) is a leading private university in Bangladesh offering undergraduate and postgraduate programmes in science, business, engineering, health, and humanities.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "102, Sukrabad, Mirpur Road, Dhanmondi",
        "addressLocality": "Dhaka",
        "postalCode": "1207",
        "addressCountry": "BD"
      },
      "telephone": "+880-2-9138234-5",
      "sameAs": [
        "https://www.facebook.com/daffodilvarsity",
        "https://twitter.com/DIU_Official",
        "https://www.linkedin.com/school/daffodil-international-university/"
      ],
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://diu.edu.bd/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Fonts ───────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <style>
      /* Hide scrollbar while keeping scroll functionality */
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
