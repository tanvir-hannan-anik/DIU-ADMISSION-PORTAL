# ── Python AI Service ─────────────────────────────────────────────────────────
python.service.url=${PYTHON_SERVICE_URL:http://localhost:5000}
python.service.timeout=30000

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ── Email (SMTP) ──────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
diu.mail.from=DIU Admissions <admission@daffodilvarsity.edu.bd>

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:diu-university-super-secret-key-2024-must-be-at-least-32-chars}
jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.university=DEBUG
