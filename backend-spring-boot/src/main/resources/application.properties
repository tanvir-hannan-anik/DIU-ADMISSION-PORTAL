server.port=${PORT:8080}
server.servlet.context-path=/api

# ── Database: H2 (local dev — zero setup) ────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:university_automation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA shared settings ───────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── Python AI Service ─────────────────────────────────────────────────────────
python.service.url=${PYTHON_SERVICE_URL:http://localhost:5000}
python.service.timeout=30000

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ── Email (SMTP) ──────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
diu.mail.from=DIU Admissions <admission@daffodilvarsity.edu.bd>

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:diu-university-super-secret-key-2024-must-be-at-least-32-chars}
jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.university=DEBUG
